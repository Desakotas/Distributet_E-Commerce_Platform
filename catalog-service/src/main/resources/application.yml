server:
  port: 8082

spring:
  application:
    name: catalog-service
  datasource:
    url: jdbc:h2:mem:catalog;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

security:
  jwt:
    secret: ${JWT_SECRET:course-demo-secret-key-please-change-32-bytes-minimum}

management:
  endpoints:
    web:
      exposure:
        include: health,info
